server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. API Requests -> Proxy to Strapi
    # Any path starting with /api is sent to Strapi
    location /api {
        proxy_pass http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Admin Panel -> Proxy to Strapi
    # Strapi Admin is usually at /admin
    location /admin {
        proxy_pass http://127.0.0.1:1337/admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Strapi Uploads -> Proxy to Strapi
    location /uploads {
        proxy_pass http://127.0.0.1:1337/uploads;
    }

    # 4. Content Manager & Plugins (Strapi internals)
    location /content-manager {
        proxy_pass http://127.0.0.1:1337;
    }
    location /content-type-builder {
        proxy_pass http://127.0.0.1:1337;
    }
    location /upload {
        proxy_pass http://127.0.0.1:1337;
    }
    location /users-permissions {
        proxy_pass http://127.0.0.1:1337;
    }
    location /i18n {
        proxy_pass http://127.0.0.1:1337;
    }
    
    # documentation plugin
    location /documentation {
         proxy_pass http://127.0.0.1:1337;
    }


    # 5. Frontend (SPA) -> Serve Static Files
    # If file exists, serve it. If not, fallback to index.html (for React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
