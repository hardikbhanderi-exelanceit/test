server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests to backend if needed, 
    # but usually frontend calls API directly via URL
    # location /api {
    #     proxy_pass http://strapi:1337;
    # }
}
